<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>열린학원 교재 점검 시스템</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=SUIT:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    body { font-family:'SUIT',system-ui,sans-serif; background:#f4f6fb; }
    .app-shell {
      min-height:100vh;
      background:
        radial-gradient(circle at 0% 0%, rgba(124,58,237,0.12), transparent 24%),
        radial-gradient(circle at 100% 0%, rgba(59,130,246,0.10), transparent 22%),
        linear-gradient(180deg, #f8f9ff 0%, #f4f6fb 42%, #f8f9ff 100%);
    }
    .glass { background:rgba(255,255,255,0.94); }
    .soft-border { border:1px solid rgba(226,232,240,0.92); }
    .sidebar-shadow { box-shadow: 0 16px 32px rgba(15,23,42,0.06); }
    .panel-shadow { box-shadow: 0 12px 24px rgba(15,23,42,0.06); }
    .card-3d {
      background: linear-gradient(180deg, rgba(255,255,255,0.98), rgba(255,255,255,0.90));
      border: 1px solid rgba(255,255,255,0.95);
      box-shadow: 0 16px 32px rgba(15,23,42,0.06), inset 0 1px 0 rgba(255,255,255,0.85);
    }
    .hero-panel {
      background: linear-gradient(135deg, rgba(109,40,217,0.11), rgba(139,92,246,0.08) 55%, rgba(59,130,246,0.06));
      border: 1px solid rgba(196,181,253,0.38);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.7), 0 24px 50px rgba(109,40,217,0.10);
    }
    .nav-pill {
      color:#334155;
      background:linear-gradient(180deg, rgba(255,255,255,0.92), rgba(248,250,252,0.9));
      border:1px solid rgba(226,232,240,0.95);
      border-radius:18px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.96), 0 8px 18px rgba(15,23,42,0.04);
    }
    .nav-pill:hover { transform:translateY(-1px); border-color:rgba(196,181,253,0.8); }
    .nav-pill-active {
      color:#fff;
      border-radius:18px;
      border:1px solid rgba(139,92,246,0.34);
      background:linear-gradient(135deg, #6d28d9 0%, #8b5cf6 55%, #4f46e5 100%);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.26), 0 16px 24px rgba(109,40,217,0.24);
    }
    .section-hero {
      background: linear-gradient(135deg, rgba(255,255,255,0.96) 0%, rgba(245,243,255,0.94) 55%, rgba(239,246,255,0.94) 100%);
      border:1px solid rgba(226,232,240,0.92);
      box-shadow:0 14px 28px rgba(15,23,42,0.06);
    }
    .top-context-wrap {
      border-radius:24px;
      background:linear-gradient(135deg, rgba(255,255,255,0.98) 0%, rgba(247,244,255,0.96) 60%, rgba(239,246,255,0.96) 100%);
      border:1px solid rgba(226,232,240,0.95);
      box-shadow:0 10px 22px rgba(15,23,42,0.05);
    }
    .top-context-chip {
      border-radius:999px;
      border:1px solid rgba(226,232,240,0.95);
      background:linear-gradient(180deg, rgba(255,255,255,0.98), rgba(248,250,252,0.95));
      color:#475569;
      font-weight:800;
      font-size:13px;
      padding:10px 15px;
      transition:all .18s ease;
      white-space:nowrap;
    }
    .top-context-chip-active {
      color:#fff;
      border-color:rgba(124,58,237,0.38);
      background:linear-gradient(135deg, #6d28d9 0%, #8b5cf6 58%, #4f46e5 100%);
      box-shadow:0 14px 24px rgba(109,40,217,0.18);
    }
    .teacher-chip {
      height:54px;
      border-radius:18px;
      border:1px solid rgba(226,232,240,0.95);
      font-weight:800;
      color:#334155;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.9), 0 10px 24px rgba(15,23,42,0.05);
    }
    .teacher-chip-selected {
      color:#fff !important;
      border-color:rgba(124,58,237,0.4) !important;
      background:linear-gradient(135deg, #6d28d9, #8b5cf6 62%, #4f46e5) !important;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.24), 0 18px 28px rgba(109,40,217,0.24) !important;
    }
    .teacher-chip-1 { background: linear-gradient(180deg, rgba(255,255,255,0.96), rgba(245,243,255,0.94)); }
    .teacher-chip-2 { background: linear-gradient(180deg, rgba(255,255,255,0.96), rgba(239,246,255,0.94)); }
    .teacher-chip-3 { background: linear-gradient(180deg, rgba(255,255,255,0.96), rgba(236,253,245,0.94)); }
    .teacher-chip-4 { background: linear-gradient(180deg, rgba(255,255,255,0.96), rgba(255,247,237,0.94)); }
    .teacher-chip-5 { background: linear-gradient(180deg, rgba(255,255,255,0.96), rgba(250,245,255,0.94)); }
    .teacher-chip-6 { background: linear-gradient(180deg, rgba(255,255,255,0.96), rgba(238,242,255,0.94)); }
    .mini-scroll::-webkit-scrollbar { width:8px; height:8px; }
    .mini-scroll::-webkit-scrollbar-thumb { background:rgba(148,163,184,0.45); border-radius:999px; }
    .book-track { height:18px; border-radius:999px; overflow:hidden; background:#eef2ff; }
    .completed-seg { background: linear-gradient(90deg, #6ee7b7, #34d399); }
    .incomplete-seg { background: linear-gradient(90deg, #fca5a5, #fb7185); }
    .unit-chip { border-radius:999px; padding:7px 12px; font-size:12px; font-weight:800; }
    .hidden-view { display:none; }
    .print-report { max-width:900px; margin:0 auto; }
    @media print {
      body * { visibility:hidden; }
      #printArea, #printArea * { visibility:visible; }
      #printArea { position:absolute; inset:0; background:white; }
      .no-print { display:none !important; }
    }
  </style>
</head>
<body>
<div id="app" class="app-shell"></div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
  import {
    getFirestore, collection, addDoc, updateDoc, doc, onSnapshot, getDocs,
    query, where, writeBatch, serverTimestamp, setDoc
  } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';
  import { getAuth, signInAnonymously } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';

 const firebaseConfig = {
  apiKey: "AIzaSyDe6YKpOHsnoTtUWi1wjbQSSaDbG5pWIt0",
  authDomain: "open-academy-textbook.firebaseapp.com",
  projectId: "open-academy-textbook",
  storageBucket: "open-academy-textbook.firebasestorage.app",
  messagingSenderId: "143926809598",
  appId: "1:143926809598:web:ac97b94f798df982c866af"
};


  const hasPlaceholder = Object.values(firebaseConfig).some(v => String(v).startsWith('YOUR_'));
  const appRoot = document.getElementById('app');

  if (hasPlaceholder) {
    appRoot.innerHTML = `
      <div class="min-h-screen flex items-center justify-center p-6">
        <div class="glass soft-border panel-shadow rounded-[32px] max-w-2xl w-full p-8">
          <div class="text-sm font-extrabold text-violet-700">열린학원 교재 점검 시스템</div>
          <h1 class="mt-2 text-3xl font-black text-slate-900">Firebase 6종 키를 먼저 넣어주세요</h1>
          <div class="mt-5 rounded-2xl bg-slate-50 border border-slate-200 p-5 text-sm text-slate-700 leading-7 whitespace-pre-wrap">index.html 안의 firebaseConfig 자리만 실제 값으로 바꾸면 바로 실행됩니다.

apiKey
authDomain
projectId
storageBucket
messagingSenderId
appId</div>
        </div>
      </div>`;
    throw new Error('Firebase config missing');
  }

  const firebaseApp = initializeApp(firebaseConfig);
  const db = getFirestore(firebaseApp);
  const auth = getAuth(firebaseApp);
  await signInAnonymously(auth);

  const COLORS = ['#FDE68A','#BFDBFE','#DDD6FE','#A7F3D0','#FBCFE8','#FECACA','#C7D2FE','#BBF7D0'];
  const state = {
    loading:true,
    view:'dashboard',
    currentTeacher:null,
    selectedTeacherName:'',
    pin:'',
    teachers:[], classes:[], students:[], books:[], classBooks:[], inspections:[],
    dashboardTeacherFilter:'all',
    selectedClassId:'', selectedStudentId:'', selectedBookId:'', selectedDate:new Date().toISOString().slice(0,10),
    selectedRangeStart:'', selectedRangeEnd:'', missedPages:'', memo:'',
    reportStudentId:'', reportClassId:'',
    quickClassId:'',
    printHtml:'',
    formBook:{ title:'', subject:'영어', grade:'', publisher:'', active:true },
    formUnit:{ name:'', start:'', end:'' },
    editingBookId:'',
    selectedBookManageId:'',
    formClass:{ name:'', teacherId:'', grade:'', note:'' },
    formStudent:{ name:'', classId:'', grade:'', school:'', active:true },
    assigningClassId:'',
    saveMsg:''
  };

  const refs = {
    teachers: collection(db, 'openacademy_textbook_teachers'),
    classes: collection(db, 'openacademy_textbook_classes'),
    students: collection(db, 'openacademy_textbook_students'),
    books: collection(db, 'openacademy_textbook_books'),
    classBooks: collection(db, 'openacademy_textbook_class_books'),
    inspections: collection(db, 'openacademy_textbook_inspections')
  };

  function safe(v){ return String(v ?? '').replace(/[&<>\"']/g, m=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[m])); }
  function uid(){ return Math.random().toString(36).slice(2,10); }
  function fmtDate(v){ const d = new Date(v); if (isNaN(d)) return '-'; return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`; }
  function teacherNameById(id){ return state.teachers.find(t=>t.id===id)?.name || '-'; }
  function classById(id){ return state.classes.find(c=>c.id===id) || null; }
  function studentById(id){ return state.students.find(s=>s.id===id) || null; }
  function bookById(id){ return state.books.find(b=>b.id===id) || null; }
  function bookUnits(book){ return [...(book?.units || [])].sort((a,b)=>Number(a.start)-Number(b.start)); }
  function assignedBooksForClass(classId){
    return state.classBooks.filter(x=>x.classId===classId && x.active!==false).sort((a,b)=>Number(a.order||0)-Number(b.order||0)).map(x=>({ link:x, book:bookById(x.bookId) })).filter(x=>x.book);
  }
  function studentsForClass(classId){ return state.students.filter(s=>s.classId===classId && s.active!==false).sort((a,b)=>String(a.name).localeCompare(String(b.name),'ko')); }
  function inspectionsForStudent(studentId){ return state.inspections.filter(i=>i.studentId===studentId).sort((a,b)=>String(b.date).localeCompare(String(a.date))); }
  function classProgress(classId){
    const students = studentsForClass(classId);
    if (!students.length) return 0;
    const rows = students.flatMap(s => state.inspections.filter(i=>i.studentId===s.id));
    if (!rows.length) return 0;
    return Math.round(rows.reduce((sum,r)=>sum+Number(r.completionRate||0),0)/rows.length);
  }
  function teacherClasses(teacherId){ return state.classes.filter(c=>c.teacherId===teacherId); }
  function parseMissedPages(text){
    const list = String(text||'').split(',').map(v=>v.trim()).filter(Boolean).flatMap(chunk=>{
      if (chunk.includes('-')) {
        const [s,e] = chunk.split('-').map(Number);
        if (!isNaN(s) && !isNaN(e) && e>=s) return Array.from({length:e-s+1}, (_,i)=>s+i);
      }
      const n = Number(chunk);
      return isNaN(n) ? [] : [n];
    });
    return [...new Set(list)].sort((a,b)=>a-b);
  }
  function pagesInRange(start,end){
    const s=Number(start), e=Number(end);
    if (isNaN(s)||isNaN(e)||e<s) return [];
    return Array.from({length:e-s+1}, (_,i)=>s+i);
  }
  function unitsForRange(book,start,end){
    return bookUnits(book).filter(u => !(Number(u.end) < Number(start) || Number(u.start) > Number(end)));
  }
  function pastel(index){ return COLORS[index % COLORS.length]; }
  function reportForStudent(studentId){
    const student = studentById(studentId); if (!student) return '';
    const klass = classById(student.classId);
    const rows = inspectionsForStudent(studentId);
    const grouped = {};
    rows.forEach(r=>{ grouped[r.bookId] = grouped[r.bookId] || []; grouped[r.bookId].push(r); });
    const cards = Object.entries(grouped).map(([bookId, items])=>{
      const book = bookById(bookId);
      const avg = Math.round(items.reduce((s,r)=>s+Number(r.completionRate||0),0)/items.length);
      const latest = items[0];
      return `
        <div class="rounded-[24px] border border-slate-200 p-5 mb-4">
          <div class="flex items-center justify-between gap-3">
            <div>
              <div class="text-xl font-black text-slate-900">${safe(book?.title || '-')}</div>
              <div class="text-sm text-slate-500 mt-1">최근 점검일 ${safe(fmtDate(latest.date))} · 평균 완료율 ${avg}%</div>
            </div>
            <div class="rounded-full bg-violet-50 border border-violet-200 px-4 py-2 text-sm font-black text-violet-700">${avg}%</div>
          </div>
          <div class="mt-4 space-y-3">
            ${items.slice(0,5).map(r=>`
              <div class="rounded-2xl bg-slate-50 border border-slate-200 px-4 py-3">
                <div class="flex items-center justify-between gap-3 text-sm">
                  <div class="font-bold text-slate-800">${safe(fmtDate(r.date))} · ${safe(r.rangeStart)}~${safe(r.rangeEnd)}쪽</div>
                  <div class="font-black text-violet-700">${safe(r.completionRate)}%</div>
                </div>
                <div class="mt-1 text-xs text-slate-500">단원: ${safe((r.units || []).join(', ') || '-')}</div>
                <div class="mt-1 text-xs text-rose-600">미완료: ${safe((r.missedPages || []).join(', ') || '없음')}</div>
                ${r.memo ? `<div class="mt-1 text-xs text-slate-600">메모: ${safe(r.memo)}</div>` : ''}
              </div>`).join('')}
          </div>
        </div>`;
    }).join('');

    return `
      <div class="print-report bg-white min-h-screen p-8">
        <div class="rounded-[28px] border border-slate-200 p-6 bg-[linear-gradient(135deg,rgba(255,255,255,0.98),rgba(245,243,255,0.96),rgba(239,246,255,0.96))]">
          <div class="text-sm font-black text-violet-700">열린학원 교재 점검 보고서</div>
          <h1 class="mt-2 text-3xl font-black text-slate-900">${safe(student.name)}</h1>
          <div class="mt-2 text-sm text-slate-600">${safe(klass?.name || '-')} · ${safe(student.school || '-')} · ${safe(student.grade || '-')}학년</div>
        </div>
        <div class="mt-6">${cards || '<div class="text-slate-400">점검 기록이 없습니다.</div>'}</div>
      </div>`;
  }
  function reportForClass(classId){
    const klass = classById(classId); if (!klass) return '';
    const students = studentsForClass(classId);
    const rows = students.map(s=>{
      const logs = inspectionsForStudent(s.id);
      const avg = logs.length ? Math.round(logs.reduce((sum,r)=>sum+Number(r.completionRate||0),0)/logs.length) : 0;
      const latest = logs[0]?.date || '';
      return `<tr><td class="border px-3 py-2">${safe(s.name)}</td><td class="border px-3 py-2">${safe(s.school||'-')}</td><td class="border px-3 py-2">${avg}%</td><td class="border px-3 py-2">${safe(fmtDate(latest))}</td></tr>`;
    }).join('');
    return `
      <div class="print-report bg-white min-h-screen p-8">
        <div class="rounded-[28px] border border-slate-200 p-6 bg-[linear-gradient(135deg,rgba(255,255,255,0.98),rgba(245,243,255,0.96),rgba(239,246,255,0.96))]">
          <div class="text-sm font-black text-violet-700">열린학원 반별 교재 현황표</div>
          <h1 class="mt-2 text-3xl font-black text-slate-900">${safe(klass.name)}</h1>
          <div class="mt-2 text-sm text-slate-600">담당 강사 ${safe(teacherNameById(klass.teacherId))}</div>
        </div>
        <table class="w-full mt-6 border-collapse text-sm"><thead><tr class="bg-slate-50"><th class="border px-3 py-2">학생</th><th class="border px-3 py-2">학교</th><th class="border px-3 py-2">평균 완료율</th><th class="border px-3 py-2">최근 점검일</th></tr></thead><tbody>${rows || '<tr><td colspan="4" class="border px-3 py-8 text-center text-slate-400">학생이 없습니다.</td></tr>'}</tbody></table>
      </div>`;
  }

  async function ensureSeedData(){
    const teacherSnap = await getDocs(refs.teachers);
    if (!teacherSnap.empty) return;
    const batch = writeBatch(db);

    const teacherDocs = [
      { id:'t_admin', name:'관리자', pin:'9999', role:'admin', active:true },
      { id:'t_kim', name:'김선생', pin:'1234', role:'teacher', active:true },
      { id:'t_lee', name:'이선생', pin:'2345', role:'teacher', active:true }
    ];
    teacherDocs.forEach(t=>batch.set(doc(db,'openacademy_textbook_teachers',t.id),{...t, createdAt:serverTimestamp()}));

    const books = [
      { id:'b1', title:'중3 영어 시험대비', subject:'영어', grade:'중3', publisher:'열린학원', active:true, archived:false, units:[
        { id:uid(), name:'문법 1', start:1, end:20, color:pastel(0) },
        { id:uid(), name:'문법 2', start:21, end:45, color:pastel(1) },
        { id:uid(), name:'서술형', start:46, end:70, color:pastel(2) }
      ]},
      { id:'b2', title:'고1 독해 특강', subject:'영어', grade:'고1', publisher:'열린학원', active:true, archived:false, units:[
        { id:uid(), name:'Unit 1', start:1, end:25, color:pastel(3) },
        { id:uid(), name:'Unit 2', start:26, end:52, color:pastel(4) },
        { id:uid(), name:'Unit 3', start:53, end:88, color:pastel(5) }
      ]}
    ];
    books.forEach(b=>batch.set(doc(db,'openacademy_textbook_books',b.id),{...b, createdAt:serverTimestamp()}));

    const classes = [
      { id:'c1', name:'중3 A반', teacherId:'t_kim', grade:'중3', note:'시험대비반', active:true },
      { id:'c2', name:'고1 독해반', teacherId:'t_lee', grade:'고1', note:'독해집중', active:true }
    ];
    classes.forEach(c=>batch.set(doc(db,'openacademy_textbook_classes',c.id),{...c, createdAt:serverTimestamp()}));

    const students = [
      { id:'s1', name:'김다인', classId:'c1', grade:'중3', school:'파주중', active:true },
      { id:'s2', name:'박서윤', classId:'c1', grade:'중3', school:'문산중', active:true },
      { id:'s3', name:'이하준', classId:'c2', grade:'고1', school:'파주고', active:true }
    ];
    students.forEach(s=>batch.set(doc(db,'openacademy_textbook_students',s.id),{...s, createdAt:serverTimestamp()}));

    const links = [
      { id:'cb1', classId:'c1', bookId:'b1', order:1, main:true, active:true },
      { id:'cb2', classId:'c2', bookId:'b2', order:1, main:true, active:true }
    ];
    links.forEach(l=>batch.set(doc(db,'openacademy_textbook_class_books',l.id),{...l, createdAt:serverTimestamp()}));
    await batch.commit();
  }

  function subscribe(){
    onSnapshot(refs.teachers, snap => { state.teachers = snap.docs.map(d=>({id:d.id,...d.data()})).filter(x=>x.active!==false); render(); });
    onSnapshot(refs.classes, snap => { state.classes = snap.docs.map(d=>({id:d.id,...d.data()})).filter(x=>x.active!==false); render(); });
    onSnapshot(refs.students, snap => { state.students = snap.docs.map(d=>({id:d.id,...d.data()})).filter(x=>x.active!==false); render(); });
    onSnapshot(refs.books, snap => { state.books = snap.docs.map(d=>({id:d.id,...d.data()})); render(); });
    onSnapshot(refs.classBooks, snap => { state.classBooks = snap.docs.map(d=>({id:d.id,...d.data()})).filter(x=>x.active!==false); render(); });
    onSnapshot(refs.inspections, snap => { state.inspections = snap.docs.map(d=>({id:d.id,...d.data()})); state.loading=false; render(); });
  }

  function setView(view){ state.view=view; render(); }
  function notify(msg){ state.saveMsg=msg; render(); setTimeout(()=>{ state.saveMsg=''; render(); }, 1800); }

  function handleLogin(){
    const teacher = state.teachers.find(t=>t.name===state.selectedTeacherName && String(t.pin)===String(state.pin));
    if (!teacher) { alert('PIN이 올바르지 않습니다.'); return; }
    state.currentTeacher = teacher;
    state.dashboardTeacherFilter = teacher.role==='admin' ? 'all' : teacher.id;
    state.quickClassId = teacherClasses(teacher.id)[0]?.id || '';
    state.reportClassId = teacherClasses(teacher.id)[0]?.id || '';
    render();
  }

  async function saveClass(){
    const f=state.formClass;
    if (!f.name || !f.teacherId) return alert('반 이름과 담당 강사를 입력해주세요.');
    await addDoc(refs.classes,{...f, active:true, createdAt:serverTimestamp()});
    state.formClass={ name:'', teacherId:'', grade:'', note:'' };
    notify('반 저장 완료');
  }
  async function saveStudent(){
    const f=state.formStudent;
    if (!f.name || !f.classId) return alert('학생 이름과 반을 입력해주세요.');
    await addDoc(refs.students,{...f, active:true, createdAt:serverTimestamp()});
    state.formStudent={ name:'', classId:'', grade:'', school:'', active:true };
    notify('학생 저장 완료');
  }
  async function saveBook(){
    const f=state.formBook;
    if (!f.title) return alert('교재명을 입력해주세요.');
    if (state.editingBookId) {
      await updateDoc(doc(db,'openacademy_textbook_books',state.editingBookId), {...f, updatedAt:serverTimestamp()});
      state.editingBookId='';
    } else {
      await addDoc(refs.books,{...f, units:[], archived:false, createdAt:serverTimestamp()});
    }
    state.formBook={ title:'', subject:'영어', grade:'', publisher:'', active:true };
    notify('교재 저장 완료');
  }
  async function saveUnit(){
    const book = bookById(state.selectedBookManageId);
    if (!book) return alert('단원을 추가할 교재를 먼저 선택해주세요.');
    if (!state.formUnit.name || !state.formUnit.start || !state.formUnit.end) return alert('단원명과 시작/끝 페이지를 입력해주세요.');
    const start = Number(state.formUnit.start), end = Number(state.formUnit.end);
    if (end < start) return alert('끝 페이지는 시작 페이지보다 크거나 같아야 합니다.');
    const overlapped = (book.units || []).some(u => !(Number(u.end) < start || Number(u.start) > end));
    if (overlapped) return alert('페이지 범위가 기존 단원과 겹칩니다.');
    const units = [...(book.units || []), { id:uid(), name:state.formUnit.name, start, end, color:pastel((book.units||[]).length) }];
    await updateDoc(doc(db,'openacademy_textbook_books',book.id), { units, updatedAt:serverTimestamp() });
    state.formUnit={ name:'', start:'', end:'' };
    notify('단원 추가 완료');
  }
  async function toggleArchiveBook(bookId, archived){
    await updateDoc(doc(db,'openacademy_textbook_books',bookId), { archived: !archived, updatedAt:serverTimestamp() });
    notify(archived ? '교재 복구 완료' : '교재 보관 완료');
  }
  async function assignBook(classId, bookId){
    if (!classId || !bookId) return alert('반과 교재를 선택해주세요.');
    const exists = state.classBooks.find(x=>x.classId===classId && x.bookId===bookId && x.active!==false);
    if (exists) return alert('이미 배정된 교재입니다.');
    const order = assignedBooksForClass(classId).length + 1;
    await addDoc(refs.classBooks,{ classId, bookId, order, main:order===1, active:true, createdAt:serverTimestamp() });
    notify('반별 교재 배정 완료');
  }
  async function removeAssign(linkId){
    await updateDoc(doc(db,'openacademy_textbook_class_books',linkId), { active:false, updatedAt:serverTimestamp() });
    notify('배정 해제 완료');
  }
  async function saveInspection(){
    const student = studentById(state.selectedStudentId);
    const book = bookById(state.selectedBookId);
    if (!student || !book) return alert('학생과 교재를 선택해주세요.');
    const start = Number(state.selectedRangeStart), end = Number(state.selectedRangeEnd);
    if (isNaN(start) || isNaN(end) || end < start) return alert('검사 범위를 정확히 입력해주세요.');
    const totalPages = pagesInRange(start,end);
    const missedPages = parseMissedPages(state.missedPages).filter(p=>p>=start && p<=end);
    const completionRate = totalPages.length ? Math.round(((totalPages.length - missedPages.length) / totalPages.length) * 100) : 0;
    const units = unitsForRange(book, start, end).map(u=>u.name);
    await addDoc(refs.inspections, {
      teacherId: state.currentTeacher.id,
      teacherName: state.currentTeacher.name,
      classId: student.classId,
      studentId: student.id,
      bookId: book.id,
      date: state.selectedDate,
      rangeStart: start,
      rangeEnd: end,
      missedPages,
      completionRate,
      units,
      memo: state.memo,
      createdAt: serverTimestamp()
    });
    state.missedPages=''; state.memo='';
    notify('교재 점검 저장 완료');
  }

        <div class="grid xl:grid-cols-[1.05fr_0.95fr] gap-6">
          <div class="card-3d rounded-[28px] p-5">

            <div class="space-y-4">
              ${classes.length ? classes.map(c=>{
                const progress = classProgress(c.id);
                const assigned = assignedBooksForClass(c.id).length;
                const count = studentsForClass(c.id).length;
                return `
                  <div class="rounded-[24px] border border-slate-200 p-4 bg-white">
                    <div class="flex items-center justify-between gap-3">
                      <div>
                        <div class="text-base font-black text-slate-900">${safe(c.name)}</div>
                        <div class="text-xs text-slate-500 mt-1">담당 ${safe(teacherNameById(c.teacherId))} · 학생 ${count}명 · 교재 ${assigned}권</div>
                      </div>

  function render(){
    if (state.loading) {
      appRoot.innerHTML = `<div class="min-h-screen flex items-center justify-center text-violet-700 font-bold text-xl">데이터 불러오는 중...</div>`;
      bind();
      return;
    }
    if (!state.currentTeacher) {
      appRoot.innerHTML = loginScreen();
      bind();
      return;
    }
    const content = state.view==='dashboard' ? dashboardView()
      : state.view==='inspections' ? inspectionsView()
      : state.view==='reports' ? reportsView()
      : state.view==='books' ? booksView()
      : state.view==='assign' ? assignView()
      : manageView();
    appRoot.innerHTML = layout(content);
    bind();
  }

  function bind(){
    appRoot.querySelectorAll('[data-action="view"]').forEach(el=>el.onclick=()=>setView(el.dataset.view));
    appRoot.querySelectorAll('[data-action="select-teacher"]').forEach(el=>el.onclick=()=>{ state.selectedTeacherName=el.dataset.id; render(); });
    const loginPin = document.getElementById('loginPin'); if (loginPin) loginPin.oninput=(e)=>state.pin=e.target.value.replace(/\D/g,'');
    appRoot.querySelector('[data-action="login"]')?.addEventListener('click', handleLogin);
    appRoot.querySelector('[data-action="logout"]')?.addEventListener('click', ()=>{ state.currentTeacher=null; state.pin=''; state.selectedTeacherName=''; render(); });
    appRoot.querySelector('[data-action="print"]')?.addEventListener('click', ()=>window.print());

    appRoot.querySelectorAll('[data-action="dashboard-filter"]').forEach(el=>el.onclick=()=>{ state.dashboardTeacherFilter=el.dataset.id; render(); });

    ['selectedClassId','selectedStudentId','selectedBookId','selectedDate','selectedRangeStart','selectedRangeEnd','missedPages','memo','quickClassId','reportStudentId','reportClassId','selectedBookManageId','assigningClassId'].forEach(id=>{
      const el=document.getElementById(id); if (!el) return;
      el.oninput=el.onchange=(e)=>{ state[id]=e.target.value; render(); };
    });

    document.getElementById('bookTitle')?.addEventListener('input', e=>state.formBook.title=e.target.value);
    document.getElementById('bookSubject')?.addEventListener('input', e=>state.formBook.subject=e.target.value);
    document.getElementById('bookGrade')?.addEventListener('input', e=>state.formBook.grade=e.target.value);
    document.getElementById('bookPublisher')?.addEventListener('input', e=>state.formBook.publisher=e.target.value);
    document.getElementById('unitName')?.addEventListener('input', e=>state.formUnit.name=e.target.value);
    document.getElementById('unitStart')?.addEventListener('input', e=>state.formUnit.start=e.target.value);
    document.getElementById('unitEnd')?.addEventListener('input', e=>state.formUnit.end=e.target.value);

    document.getElementById('className')?.addEventListener('input', e=>state.formClass.name=e.target.value);
    document.getElementById('classTeacherId')?.addEventListener('change', e=>state.formClass.teacherId=e.target.value);
    document.getElementById('classGrade')?.addEventListener('input', e=>state.formClass.grade=e.target.value);
    document.getElementById('classNote')?.addEventListener('input', e=>state.formClass.note=e.target.value);
    document.getElementById('studentName')?.addEventListener('input', e=>state.formStudent.name=e.target.value);
    document.getElementById('studentClassId')?.addEventListener('change', e=>state.formStudent.classId=e.target.value);
    document.getElementById('studentGrade')?.addEventListener('input', e=>state.formStudent.grade=e.target.value);
    document.getElementById('studentSchool')?.addEventListener('input', e=>state.formStudent.school=e.target.value);

    appRoot.querySelector('[data-action="save-class"]')?.addEventListener('click', saveClass);
    appRoot.querySelector('[data-action="save-student"]')?.addEventListener('click', saveStudent);
    appRoot.querySelector('[data-action="save-book"]')?.addEventListener('click', saveBook);
    appRoot.querySelector('[data-action="reset-book-form"]')?.addEventListener('click', ()=>{ state.formBook={ title:'', subject:'영어', grade:'', publisher:'', active:true }; state.editingBookId=''; render(); });
    appRoot.querySelector('[data-action="save-unit"]')?.addEventListener('click', saveUnit);
    appRoot.querySelector('[data-action="save-inspection"]')?.addEventListener('click', saveInspection);
    appRoot.querySelector('[data-action="open-quick-mode"]')?.addEventListener('click', ()=>{ state.quickClassId = state.selectedClassId || state.quickClassId || (state.currentTeacher.role==='admin' ? state.classes[0]?.id : teacherClasses(state.currentTeacher.id)[0]?.id || ''); render(); });
    appRoot.querySelectorAll('[data-action="quick-fill"]').forEach(el=>el.onclick=()=>{ state.selectedStudentId=el.dataset.id; state.selectedClassId=studentById(el.dataset.id)?.classId || ''; setView('inspections'); });
    appRoot.querySelectorAll('[data-action="edit-book"]').forEach(el=>el.onclick=()=>{
      const b=bookById(el.dataset.id); if (!b) return;
      state.formBook={ title:b.title||'', subject:b.subject||'', grade:b.grade||'', publisher:b.publisher||'', active:b.active!==false };
      state.editingBookId=b.id; state.selectedBookManageId=b.id; render();
    });
    appRoot.querySelectorAll('[data-action="toggle-book-archive"]').forEach(el=>el.onclick=()=>{ const b=bookById(el.dataset.id); if (b) toggleArchiveBook(b.id, !!b.archived); });
    appRoot.querySelectorAll('[data-action="assign-book"]').forEach(el=>el.onclick=()=>assignBook(el.dataset.class, el.dataset.book));
    appRoot.querySelectorAll('[data-action="remove-assign"]').forEach(el=>el.onclick=()=>removeAssign(el.dataset.id));
    appRoot.querySelector('[data-action="build-student-report"]')?.addEventListener('click', ()=>{ state.printHtml=reportForStudent(state.reportStudentId); render(); });
    appRoot.querySelector('[data-action="build-class-report"]')?.addEventListener('click', ()=>{ state.printHtml=reportForClass(state.reportClassId); render(); });
  }

  await ensureSeedData();
  subscribe();
  render();
</script>
<script src="https://kit.fontawesome.com/6f7d2f1f95.js" crossorigin="anonymous"></script>
</body>
</html>
