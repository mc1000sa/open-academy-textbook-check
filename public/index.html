function safe(v){ return String(v ?? '').replace(/[&<>\"']/g, m=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[m])); }
function uid(){ return Math.random().toString(36).slice(2,10); }
function fmtDate(v){ const d = new Date(v); if (isNaN(d)) return '-'; return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`; }
function teacherNameById(id){ return state.teachers.find(t=>t.id===id)?.name || '-'; }
function classById(id){ return state.classes.find(c=>c.id===id) || null; }
function studentById(id){ return state.students.find(s=>s.id===id) || null; }
function bookById(id){ return state.books.find(b=>b.id===id) || null; }
function bookUnits(book){ return [...(book?.units || [])].sort((a,b)=>Number(a.start)-Number(b.start)); }
function studentsForClass(classId){ return state.students.filter(s=>s.classId===classId && s.active!==false).sort((a,b)=>String(a.name).localeCompare(String(b.name),'ko')); }
function assignedBooksForClass(classId){ return state.classBooks.filter(x=>x.classId===classId && x.active!==false).sort((a,b)=>Number(a.order||0)-Number(b.order||0)).map(x=>({ link:x, book:bookById(x.bookId) })).filter(x=>x.book && !x.book.archived); }
function inspectionsForStudent(studentId){ return state.inspections.filter(i=>i.studentId===studentId).sort((a,b)=>String(b.date).localeCompare(String(a.date))); }
function teacherClasses(teacherId){ return state.classes.filter(c=>c.teacherId===teacherId && c.active!==false); }
function parseMissedPages(text){ const list = String(text||'').split(',').map(v=>v.trim()).filter(Boolean).flatMap(chunk=>{ if (chunk.includes('-')) { const [s,e] = chunk.split('-').map(Number); if (!isNaN(s)&&!isNaN(e)&&e>=s) return Array.from({length:e-s+1},(_,i)=>s+i);} const n=Number(chunk); return isNaN(n)?[]:[n];}); return [...new Set(list)].sort((a,b)=>a-b); }
function pagesInRange(start,end){ const s=Number(start), e=Number(end); if (isNaN(s)||isNaN(e)||e<s) return []; return Array.from({length:e-s+1}, (_,i)=>s+i); }
function unitsForRange(book,start,end){ return bookUnits(book).filter(u => !(Number(u.end) < Number(start) || Number(u.start) > Number(end))); }
function pastel(index){ return COLORS[index % COLORS.length]; }
function notify(msg){ state.saveMsg=msg; render(); setTimeout(()=>{ state.saveMsg=''; render(); }, 1800); }
function setupProgress(){ const klass = classById(state.selectedSetupClassId); const studentCount = klass ? studentsForClass(klass.id).length : 0; const books = klass ? assignedBooksForClass(klass.id).length : 0; return [{ label:'반 생성', done: !!klass },{ label:'교재 배정', done: books > 0 },{ label:'학생 등록', done: studentCount > 0 },{ label:'운영 시작', done: !!klass && studentCount > 0 && books > 0 }]; }
function findDuplicateStudentName(classId, name, school=''){ return state.students.find(s => s.classId===classId && String(s.name||'').trim()===String(name||'').trim() && String(s.school||'').trim()===String(school||'').trim() && s.active!==false); }

function existingStudentProfilesForClass(classId){
  const seen = new Set();
  return state.students
    .filter(s => s.active!==false && s.classId!==classId)
    .filter(s => {
      const key = `${String(s.name||'').trim()}__${String(s.school||'').trim()}__${String(s.grade||'').trim()}`;
      if (seen.has(key)) return false;
      seen.add(key);
      return true;
    })
    .sort((a,b)=>String(a.name).localeCompare(String(b.name),'ko'));
}
async function addExistingStudentToClass(sourceStudentId, classId){
  const klass = classById(classId);
  const source = studentById(sourceStudentId);
  if (!klass || !source) return alert('반과 학생을 먼저 선택해주세요.');
  if (findDuplicateStudentName(classId, source.name, source.school || '')) return alert('이미 이 반에 등록된 학생입니다.');
  await addDoc(refs.students, {
    name: source.name || '',
    school: source.school || '',
    grade: klass.grade || source.grade || '',
    classId,
    active:true,
    createdAt:serverTimestamp()
  });
  state.selectedExistingStudentId = '';
  notify('기존 학생을 현재 반에 추가했습니다');
  render();
}
function setupDetailSection(selectedClass){
  if (!state.setupDetailPanel) return '';

    return `<div class="card-3d rounded-[28px] p-5"><div class="flex items-center justify-between gap-3 mb-4"><h3 class="text-lg font-black text-slate-900">등록된 반 목록</h3><button data-action="close-setup-detail" class="text-sm font-black text-slate-500">닫기</button></div><div class="grid md:grid-cols-2 xl:grid-cols-3 gap-3">${state.classes.length ? state.classes.map(c=>`<button data-action="select-class-detail" data-id="${c.id}" class="text-left rounded-2xl border border-slate-200 bg-white px-4 py-4 hover:border-violet-300"><div class="font-black text-slate-900">${safe(c.name)}</div><div class="text-xs text-slate-500 mt-1">${safe(c.grade || '-')} · ${safe(teacherNameById(c.teacherId))}</div></button>`).join('') : '<div class="text-sm text-slate-400">등록된 반이 없습니다.</div>'}</div></div>`;
  }
  if (state.setupDetailPanel === 'students'){

    return `<div class="card-3d rounded-[28px] p-5"><div class="flex items-center justify-between gap-3 mb-4"><h3 class="text-lg font-black text-slate-900">학생 목록</h3><div class="text-xs text-slate-400">${safe(selectedClass?.name || '반 선택 필요')}</div></div><div class="space-y-3">${rows.length ? rows.map(s=>`<div class="rounded-2xl border border-slate-200 bg-white px-4 py-3"><div class="font-black text-slate-900">${safe(s.name)}</div><div class="text-xs text-slate-500 mt-1">${safe(s.school||'-')} · ${safe(s.grade||'-')} · ${safe(classById(s.classId)?.name || '-')}</div></div>`).join('') : '<div class="text-sm text-slate-400">이 반에 등록된 학생이 없습니다.</div>'}</div></div>`;
  }
  if (state.setupDetailPanel === 'books'){
    const rows = state.books.filter(b=>!b.archived).sort((a,b)=>String(a.title).localeCompare(String(b.title),'ko'));
    return `<div class="card-3d rounded-[28px] p-5"><div class="flex items-center justify-between gap-3 mb-4"><h3 class="text-lg font-black text-slate-900">교재 목록</h3><button data-action="close-setup-detail" class="text-sm font-black text-slate-500">닫기</button></div><div class="grid md:grid-cols-2 xl:grid-cols-3 gap-3">${rows.length ? rows.map(b=>`<div class="rounded-2xl border border-slate-200 bg-white px-4 py-4"><div class="font-black text-slate-900">${safe(b.title)}</div><div class="text-xs text-slate-500 mt-1">${safe(b.subject||'-')} · ${safe(b.grade||'-')} · ${bookUnits(b).length}단원</div></div>`).join('') : '<div class="text-sm text-slate-400">등록된 교재가 없습니다.</div>'}</div></div>`;
  }
  if (state.setupDetailPanel === 'classBooks'){
    const rows = selectedClass ? assignedBooksForClass(selectedClass.id) : [];
    return `<div class="card-3d rounded-[28px] p-5"><div class="flex items-center justify-between gap-3 mb-4"><h3 class="text-lg font-black text-slate-900">현재 반 교재 목록</h3><div class="text-xs text-slate-400">${safe(selectedClass?.name || '반 선택 필요')}</div></div><div class="space-y-3">${rows.length ? rows.map((x,idx)=>`<div class="rounded-2xl border border-slate-200 bg-white px-4 py-3"><div class="font-black text-slate-900">${idx+1}. ${safe(x.book.title)}</div><div class="text-xs text-slate-500 mt-1">${idx===0 ? '메인 교재' : '부교재'} · ${safe(x.book.subject || '-')} · ${safe(x.book.grade || '-')}</div></div>`).join('') : '<div class="text-sm text-slate-400">배정된 교재가 없습니다.</div>'}</div></div>`;
  }
  return '';
}

await batch.commit(); }

async function migrateDefaultTeachers(){
  const teacherSnap = await getDocs(refs.teachers);
  if (teacherSnap.empty) return;
  const renameMap = {
    t_kim: { name:'수최', pin:'1234', role:'teacher', active:true },
    t_lee: { name:'Joy', pin:'2345', role:'teacher', active:true },
    t_admin: { name:'관리자', pin:'9999', role:'admin', active:true }
  };
  const batch = writeBatch(db);
  let changed = 0;
  teacherSnap.docs.forEach((snap) => {
    const next = renameMap[snap.id];
    if (!next) return;
    const data = snap.data() || {};
    const needsUpdate = data.name !== next.name || String(data.pin || '') !== String(next.pin) || data.role !== next.role || data.active === false;
    if (!needsUpdate) return;
    batch.update(doc(db,'openacademy_textbook_teachers',snap.id), { ...next, updatedAt:serverTimestamp() });
    changed++;
  });
  if (changed) await batch.commit();
}
function resetAdminTeacherForm(){ state.adminTeacherForm = { id:'', name:'', pin:'', role:'teacher' }; state.adminTeacherEditId=''; }
function loadAdminTeacherToForm(teacherId){
  const teacher = state.teachers.find(t=>t.id===teacherId);
  if (!teacher) return;
  state.adminTeacherEditId = teacher.id;
  state.adminTeacherForm = { id:teacher.id, name:teacher.name || '', pin:String(teacher.pin || ''), role:teacher.role || 'teacher' };
  render();
}
async function saveAdminTeacher(){
  const form = state.adminTeacherForm;
  if (!form.name.trim()) return alert('강사 이름을 입력해주세요.');
  if (!/^\d{4}$/.test(String(form.pin || ''))) return alert('PIN은 4자리 숫자로 입력해주세요.');
  if (!['admin','teacher'].includes(form.role)) return alert('권한을 선택해주세요.');
  const duplicate = state.teachers.find(t => t.id !== state.adminTeacherEditId && String(t.name || '').trim() === form.name.trim() && t.active !== false);
  if (duplicate) return alert('같은 이름의 강사가 이미 있습니다.');
  if (state.adminTeacherEditId) {
    await updateDoc(doc(db,'openacademy_textbook_teachers',state.adminTeacherEditId), {
      name:form.name.trim(),
      pin:String(form.pin),
      role:form.role,
      active:true,
      updatedAt:serverTimestamp()
    });
    notify('강사 정보 수정 완료');
  } else {
    await addDoc(refs.teachers, {
      name:form.name.trim(),
      pin:String(form.pin),
      role:form.role,
      active:true,
      createdAt:serverTimestamp()
    });
    notify('강사 추가 완료');
  }
  resetAdminTeacherForm();
  render();
}
async function removeAdminTeacher(teacherId){
  const teacher = state.teachers.find(t=>t.id===teacherId);
  if (!teacher) return;
  if (teacher.role === 'admin') return alert('관리자 계정은 삭제할 수 없습니다.');
  const hasClasses = state.classes.some(c => c.teacherId === teacherId && c.active !== false);

  <div class="text-sm text-slate-500 mt-3 text-center">교재 점검 시스템</div>
</div><div class="mt-6 space-y-2 flex-1">${menuBtn('dashboard','전체 정보','fa-chart-column')}${menuBtn('setup','반 세팅','fa-sitemap')}${menuBtn('inspections','학생별 교재점검','fa-clipboard-check')}${menuBtn('reports','학생별 보고서 출력','fa-file-pdf')}${menuBtn('teachers','관리자 설정','fa-user-gear')}</div><div class="mt-auto space-y-3"><div class="bg-slate-50 p-4 rounded-2xl border border-slate-200"><div class="text-xs text-slate-500 font-bold mb-1">로그인</div><div class="flex items-center justify-between gap-2"><div class="font-black text-slate-900">${safe(currentTeacherName)} 선생님</div>${adminBadge}</div></div><button data-action="logout" class="w-full rounded-2xl bg-gradient-to-r from-slate-700 to-slate-900 text-white font-bold py-3 shadow-sm">로그아웃</button></div></div><main class="xl:pl-[290px] p-4 sm:p-6 space-y-6"><header class="sticky top-0 z-20 section-hero rounded-[28px] p-4 sm:p-5 no-print"><div class="flex items-start justify-between gap-3"><div><div class="text-sm font-bold text-violet-700">열린학원 교재 점검 시스템</div><h2 class="mt-1 text-2xl sm:text-3xl font-black text-slate-900">${({dashboard:'전체 정보', setup:'반 세팅', inspections:'학생별 교재점검', reports:'학생별 보고서 출력', teachers:'관리자 설정'})[state.view]}</h2></div><div class="flex items-center gap-3 no-print"><div class="hidden sm:block text-[11px] font-black tracking-[0.08em] bg-gradient-to-r from-slate-400 via-slate-200 to-slate-500 bg-clip-text text-transparent">Creative by mOOn_Math</div><button data-action="print" class="px-4 py-2 bg-slate-100 rounded-full font-bold text-sm text-slate-700 hover:bg-slate-200">인쇄 / PDF</button></div></div><div class="xl:hidden mt-4 flex gap-2 overflow-x-auto pb-1 no-print">${mobileMenuBtn('dashboard','전체')}${mobileMenuBtn('setup','반 세팅')}${mobileMenuBtn('inspections','점검')}${mobileMenuBtn('reports','보고서')}${mobileMenuBtn('teachers','설정')}</div></header>${state.saveMsg ? `<div class="no-print rounded-2xl border border-emerald-200 bg-emerald-50 px-4 py-3 text-sm font-black text-emerald-700">${safe(state.saveMsg)}</div>` : ''}${content}</main>`; }
function render(){ if (state.loading) { appRoot.innerHTML = `<div class="min-h-screen flex items-center justify-center text-violet-700 font-bold text-xl">데이터 불러오는 중...</div>`; bind(); return; } if (!state.currentTeacher) { appRoot.innerHTML = loginScreen(); bind(); return; } const content = state.view==='dashboard' ? dashboardView() : state.view==='setup' ? setupView() : state.view==='inspections' ? inspectionsView() : state.view==='reports' ? reportsView() : teachersAdminView(); appRoot.innerHTML = layout(content); bind(); }
function bind(){
  appRoot.querySelectorAll('[data-action="view"]').forEach(el=>el.onclick=()=>{ state.view=el.dataset.view; render(); });
  appRoot.querySelectorAll('[data-action="select-teacher"]').forEach(el=>el.onclick=()=>{ state.selectedTeacherName=el.dataset.id; render(); });
  const loginPin = document.getElementById('loginPin'); if (loginPin) { loginPin.oninput=(e)=>state.pin=e.target.value.replace(/\D/g,''); loginPin.onkeydown=(e)=>{ if (e.key==='Enter') { e.preventDefault(); handleLogin(); } }; }
  appRoot.querySelector('[data-action="login"]')?.addEventListener('click', handleLogin);
  appRoot.querySelector('[data-action="logout"]')?.addEventListener('click', ()=>{ state.currentTeacher=null; state.pin=''; state.selectedTeacherName=''; render(); });
  appRoot.querySelectorAll('[data-action="dashboard-filter"]').forEach(el=>el.onclick=()=>{ state.dashboardTeacherFilter=el.dataset.id; render(); });
  appRoot.querySelectorAll('[data-action="print"]').forEach(el=>el.onclick=()=>window.print());
  appRoot.querySelector('[data-action="open-setup-wizard"]')?.addEventListener('click', ()=>{ state.wizardOpen=true; state.wizardStep=1; state.assigningClassId = state.selectedSetupClassId || state.assigningClassId || state.classes[0]?.id || ''; render(); });
  appRoot.querySelector('[data-action="close-setup-wizard"]')?.addEventListener('click', ()=>{ state.wizardOpen=false; render(); });
  appRoot.querySelector('[data-action="wizard-prev"]')?.addEventListener('click', ()=>{ state.wizardStep=Math.max(1, state.wizardStep-1); render(); });
  appRoot.querySelector('[data-action="wizard-finish"]')?.addEventListener('click', ()=>{ state.wizardOpen=false; state.wizardStep=1; notify('반 세팅 마법사 완료'); render(); });
  appRoot.querySelector('[data-action="wizard-next"]')?.addEventListener('click', ()=>{ state.wizardStep=3; render(); });
  ['selectedSetupClassId','selectedBookManageId','assigningClassId','selectedInspectionClassId','selectedInspectionStudentId','selectedInspectionBookId','selectedDate','selectedRangeStart','selectedRangeEnd','quickClassId','reportStudentId','reportClassId','inspectionHistoryFilterClass','inspectionHistoryFilterStudent','selectedExistingStudentId'].forEach(id=>{ const el=document.getElementById(id); if (!el) return; el.onchange=(e)=>{ state[id]=e.target.value; if (id==='selectedSetupClassId') state.assigningClassId = e.target.value; render(); }; });
  ['missedPages','memo','bulkUnitText'].forEach(id=>{ const el=document.getElementById(id); if (!el) return; el.oninput=(e)=>{ state[id]=e.target.value; }; });
  document.getElementById('setupClassName')?.addEventListener('input', e=>state.setupFormClass.name=e.target.value);
  document.getElementById('setupClassGrade')?.addEventListener('change', e=>state.setupFormClass.grade=e.target.value);
  document.getElementById('wizardSetupClassName')?.addEventListener('input', e=>state.setupFormClass.name=e.target.value);
  document.getElementById('wizardSetupClassGrade')?.addEventListener('change', e=>state.setupFormClass.grade=e.target.value);
  document.getElementById('wizardSetupClassTeacherId')?.addEventListener('change', e=>state.setupFormClass.teacherId=e.target.value);
  document.getElementById('wizardSetupClassNote')?.addEventListener('input', e=>state.setupFormClass.note=e.target.value);
  document.getElementById('wizardStudentBulkText')?.addEventListener('input', e=>state.studentBulkText=e.target.value);
  document.getElementById('setupClassTeacherId')?.addEventListener('change', e=>state.setupFormClass.teacherId=e.target.value);
  document.getElementById('setupClassNote')?.addEventListener('input', e=>state.setupFormClass.note=e.target.value);
  document.getElementById('bookTitle')?.addEventListener('input', e=>state.formBook.title=e.target.value);
  document.getElementById('bookSubject')?.addEventListener('input', e=>state.formBook.subject=e.target.value);
  document.getElementById('bookGrade')?.addEventListener('input', e=>state.formBook.grade=e.target.value);
  document.getElementById('bookPublisher')?.addEventListener('input', e=>state.formBook.publisher=e.target.value);
  document.getElementById('unitName')?.addEventListener('input', e=>state.formUnit.name=e.target.value);
  document.getElementById('unitStart')?.addEventListener('input', e=>state.formUnit.start=e.target.value);
  document.getElementById('unitEnd')?.addEventListener('input', e=>state.formUnit.end=e.target.value);
  document.getElementById('adminTeacherName')?.addEventListener('input', e=>state.adminTeacherForm.name=e.target.value);
  document.getElementById('adminTeacherPin')?.addEventListener('input', e=>state.adminTeacherForm.pin=e.target.value.replace(/\D/g,'').slice(0,4));
  document.getElementById('adminTeacherRole')?.addEventListener('change', e=>state.adminTeacherForm.role=e.target.value);
  appRoot.querySelectorAll('[data-action="setup-detail"]').forEach(el=>el.onclick=()=>{ state.setupDetailPanel = state.setupDetailPanel===el.dataset.detail ? '' : el.dataset.detail; render(); });
  appRoot.querySelectorAll('[data-action="close-setup-detail"]').forEach(el=>el.onclick=()=>{ state.setupDetailPanel=''; render(); });
  appRoot.querySelectorAll('[data-action="select-class-detail"]').forEach(el=>el.onclick=()=>{ state.selectedSetupClassId=el.dataset.id; state.assigningClassId=el.dataset.id; state.setupDetailPanel='students'; render(); });
  appRoot.querySelector('[data-action="add-existing-student"]')?.addEventListener('click', ()=>addExistingStudentToClass(state.selectedExistingStudentId, state.selectedSetupClassId));
  appRoot.querySelectorAll('[data-action="save-class"]').forEach(el=>el.addEventListener('click', saveClass));
  appRoot.querySelectorAll('[data-action="reset-class-form"]').forEach(el=>el.addEventListener('click', ()=>{ resetSetupForm(); render(); }));
  appRoot.querySelectorAll('[data-action="student-mode"]').forEach(el=>el.onclick=()=>{ state.studentBulkMode=el.dataset.mode; render(); });
  appRoot.querySelectorAll('[data-action="save-students-bulk"]').forEach(el=>el.addEventListener('click', saveStudentsBulk));
  appRoot.querySelectorAll('[data-action="clear-student-bulk"]').forEach(el=>el.addEventListener('click', ()=>{ state.studentBulkText=''; render(); }));
  appRoot.querySelectorAll('[data-action="remove-student"]').forEach(el=>el.onclick=()=>removeStudent(el.dataset.id));
  appRoot.querySelector('[data-action="save-book"]')?.addEventListener('click', saveBook);
  appRoot.querySelector('[data-action="reset-book-form"]')?.addEventListener('click', ()=>{ state.formBook={ title:'', subject:'영어', grade:'', publisher:'열린학원', active:true }; state.editingBookId=''; render(); });
  appRoot.querySelector('[data-action="save-unit"]')?.addEventListener('click', saveUnit);
  appRoot.querySelector('[data-action="save-unit-bulk"]')?.addEventListener('click', saveUnitBulk);
  appRoot.querySelector('[data-action="clear-unit-bulk"]')?.addEventListener('click', ()=>{ state.bulkUnitText=''; render(); });
  appRoot.querySelectorAll('[data-action="edit-book"]').forEach(el=>el.onclick=()=>{ const b=bookById(el.dataset.id); if (!b) return; state.formBook={ title:b.title||'', subject:b.subject||'', grade:b.grade||'', publisher:b.publisher||'', active:b.active!==false }; state.editingBookId=b.id; state.selectedBookManageId=b.id; render(); });
  appRoot.querySelectorAll('[data-action="clone-book"]').forEach(el=>el.onclick=()=>cloneBook(el.dataset.id));
  appRoot.querySelectorAll('[data-action="toggle-book-archive"]').forEach(el=>el.onclick=()=>{ const b=bookById(el.dataset.id); if (b) toggleArchiveBook(b.id, !!b.archived); });
  appRoot.querySelectorAll('[data-action="select-book-manage"]').forEach(el=>el.onclick=()=>{ state.selectedBookManageId=el.dataset.id; render(); });
  appRoot.querySelectorAll('[data-action="assign-book"]').forEach(el=>el.onclick=()=>assignBook(el.dataset.class, el.dataset.book));
  appRoot.querySelectorAll('[data-action="remove-assign"]').forEach(el=>el.onclick=()=>removeAssign(el.dataset.id));
  appRoot.querySelectorAll('[data-action="move-assign"]').forEach(el=>el.onclick=()=>moveAssign(el.dataset.id, el.dataset.dir));
  appRoot.querySelector('[data-action="save-inspection"]')?.addEventListener('click', saveInspection);
  appRoot.querySelector('[data-action="open-quick-mode"]')?.addEventListener('click', ()=>{ state.quickClassId = state.selectedInspectionClassId || state.quickClassId || ''; render(); });
  appRoot.querySelectorAll('[data-action="quick-fill"]').forEach(el=>el.onclick=()=>{ state.selectedInspectionStudentId=el.dataset.id; state.selectedInspectionClassId=studentById(el.dataset.id)?.classId || ''; state.view='inspections'; render(); });
  appRoot.querySelector('[data-action="build-student-report"]')?.addEventListener('click', ()=>{ state.printHtml=reportForStudent(state.reportStudentId); render(); });
  appRoot.querySelector('[data-action="build-class-report"]')?.addEventListener('click', ()=>{ state.printHtml=reportForClass(state.reportClassId); render(); });
  appRoot.querySelector('[data-action="admin-new-teacher"]')?.addEventListener('click', ()=>{ resetAdminTeacherForm(); render(); });
  appRoot.querySelector('[data-action="admin-reset-teacher"]')?.addEventListener('click', ()=>{ resetAdminTeacherForm(); render(); });
  appRoot.querySelector('[data-action="admin-save-teacher"]')?.addEventListener('click', saveAdminTeacher);
  appRoot.querySelector('[data-action="admin-delete-teacher"]')?.addEventListener('click', (e)=>removeAdminTeacher(e.currentTarget.dataset.id));
  appRoot.querySelectorAll('[data-action="admin-edit-teacher"]').forEach(el=>el.onclick=()=>loadAdminTeacherToForm(el.dataset.id));
}
await ensureSeedData();
await migrateDefaultTeachers();
subscribe();
render();
</script>
